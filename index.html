<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Humor Hub | @vetruk_x</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="profile-section">
        <div class="profile-pic"></div>
        <h2>STREET HUMOR & RIDDLES</h2>
        <p>The Home of Kenyan Vibes 🇰🇪</p>
    </div>

    <div class="links-container">
        <a href="https://whatsapp.com/channel/0029Vb7QkV14dTnBkzndP63f" class="link-card highlight-whatsapp" target="_blank">
            <div class="card-content">
                <span>📢 FOLLOW OUR WHATSAPP CHANNEL</span>
            </div>
        </a>

        <a href="https://www.instagram.com/vetruk_x" class="link-card" target="_blank">
            <div class="card-content">
                <span>📸 INSTAGRAM: @VETRUK_X</span>
            </div>
        </a>

        <div class="link-card chat-trigger" onclick="toggleChat()">
            <div class="card-content">
                <span>💬 CHAT ON WEBSITE (LIVE)</span>
            </div>
        </div>
    </div>

    <div id="chat-box" class="chat-popup glass-card">
        <div class="chat-header">
            <span class="status-dot"></span>
            <span>Live Chat: Timon</span>
            <button class="close-btn" onclick="toggleChat()">×</button>
        </div>
        <div id="chat-window" class="chat-window">
            <div class="message bot">Sasa! How can I help you today?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your message...">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <footer>
        <p>System Developed by Timon | 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
