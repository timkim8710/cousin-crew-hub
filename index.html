<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Humor Hub | @vetruk_x</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- DYNAMIC GLASSMORPHISM CSS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: #050505;
            background: linear-gradient(180deg, #0a0a1a 0%, #050505 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .profile-section { text-align: center; margin-bottom: 30px; }
        
        .profile-pic {
            width: 90px; height: 90px; background: #111;
            border-radius: 50%; margin: 0 auto 15px;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        h2 { font-size: 1.2rem; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }
        .sub-head { font-size: 0.85rem; color: #666; margin-top: 5px; }

        .links-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

        .link-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px; border-radius: 14px;
            text-align: center; text-decoration: none; color: white;
            font-weight: 700; cursor: pointer; transition: all 0.2s ease;
            display: block;
        }

        .link-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.1); }

        /* HIGHLIGHT COLORS */
        .highlight-whatsapp { border-color: #25d366; color: #25d366; background: rgba(37, 211, 102, 0.05); }
        .chat-trigger { border-color: #00d4ff; background: rgba(0, 212, 255, 0.05); color: #00d4ff; }

        /* --- GLOBAL CHAT POPUP --- */
        .chat-popup {
            position: fixed; bottom: -600px; right: 20px;
            width: calc(100% - 40px); max-width: 360px; height: 480px;
            background: #0a0a0a; border: 1px solid #222; border-radius: 20px;
            display: flex; flex-direction: column; z-index: 9999;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .chat-popup.active { bottom: 20px; }

        .chat-header {
            padding: 15px; background: #111; display: flex; align-items: center; 
            justify-content: space-between; border-radius: 20px 20px 0 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .chat-window { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #070707; }

        /* Message Bubbles */
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; max-width: 85%; line-height: 1.4; }
        .msg b { display: block; font-size: 0.65rem; color: #00d4ff; margin-bottom: 3px; text-transform: uppercase; }
        .msg.others { background: #1a1a1a; align-self: flex-start; color: #eee; }
        .msg.me { background: #00d4ff; color: black; align-self: flex-end; font-weight: 600; }

        .chat-input-area { padding: 12px; display: flex; gap: 8px; background: #0a0a0a; border-top: 1px solid #1a1a1a; border-radius: 0 0 20px 20px; }
        .chat-input-area input { background: #000; border: 1px solid #222; color: white; padding: 10px; border-radius: 8px; outline: none; }
        
        #send-btn { background: #00d4ff; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .close-btn { background: none; border: none; color: #666; font-size: 1.5rem; cursor: pointer; }

        footer { margin-top: auto; padding: 40px 0; color: #333; font-size: 0.75rem; text-align: center; }
    </style>
</head>
<body>

    <div class="profile-section">
        <div class="profile-pic"></div>
        <h2>STREET HUMOR HUB</h2>
        <p class="sub-head">Kenyan Riddles & Vibes 🇰🇪</p>
    </div>

    <div class="links-container">
        <a href="https://whatsapp.com/channel/0029Vb7QkV14dTnBkzndP63f" class="link-card highlight-whatsapp" target="_blank">
            <span>📢 FOLLOW WHATSAPP CHANNEL</span>
        </a>

        <a href="https://www.instagram.com/vetruk_x" class="link-card" target="_blank">
            <span>📸 INSTAGRAM: @VETRUK_X</span>
        </a>

        <div class="link-card chat-trigger" onclick="document.getElementById('chat-box').classList.toggle('active')">
            <span>💬 LIVE GLOBAL CHAT (ALL USERS)</span>
        </div>

        <a href="tel:+254797989297" class="link-card">
            <span>📞 CALL TIMON: 0797989297</span>
        </a>
    </div>

    <div id="chat-box" class="chat-popup">
        <div class="chat-header">
            <div><span style="color:#00ff88;">●</span> <span style="font-size:0.9rem; font-weight:600;">Global Lobby</span></div>
            <button class="close-btn" onclick="document.getElementById('chat-box').classList.remove('active')">×</button>
        </div>
        <div id="chat-window" class="chat-window">
            </div>
        <div class="chat-input-area">
            <input type="text" id="user-name" placeholder="Name" style="width: 70px;">
            <input type="text" id="user-msg" placeholder="Type a message..." style="flex: 1;">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <footer>
        <p>System Developed by Timon | 2026</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- PASTE YOUR FIREBASE CONFIG HERE ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "global_chat");

        const sendBtn = document.getElementById("send-btn");
        const uName = document.getElementById("user-name");
        const uMsg = document.getElementById("user-msg");
        const chatWindow = document.getElementById("chat-window");

        // Function to send message
        sendBtn.onclick = () => {
            const name = uName.value.trim() || "Guest";
            const text = uMsg.value.trim();
            if (text !== "") {
                push(chatRef, { name: name, text: text });
                uMsg.value = "";
            }
        };

        // Allow 'Enter' key to send
        uMsg.addEventListener("keypress", (e) => { if(e.key === "Enter") sendBtn.onclick(); });

        // Listen for new messages
        onChildAdded(chatRef, (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement("div");
            
            // Check if current user sent it for styling
            msgDiv.className = `msg ${data.name === uName.value ? 'me' : 'others'}`;
            msgDiv.innerHTML = `<b>${data.name}</b> ${data.text}`;
            
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    </script>
</body>
</html>
