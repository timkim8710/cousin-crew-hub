<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Humor Hub | @vetruk_x</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- CSS STYLES --- */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #050505;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .profile-section { text-align: center; margin-bottom: 30px; }
        .profile-pic {
            width: 85px; height: 85px; background: #111;
            border-radius: 50%; margin: 0 auto 15px;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        h2 { font-size: 1.1rem; letter-spacing: 1px; font-weight: 800; }
        .sub-head { font-size: 0.85rem; color: #666; margin-top: 5px; }

        .links-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

        .link-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 18px; border-radius: 12px;
            text-align: center; text-decoration: none; color: white;
            font-weight: 700; cursor: pointer; transition: 0.2s;
            display: block;
        }

        .highlight-whatsapp { border-color: #25d366; color: #25d366; }
        .chat-trigger { border-color: #00d4ff; background: rgba(0, 212, 255, 0.05); }

        .link-card:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.1); }

        /* CHAT WINDOW STYLES */
        .chat-popup {
            position: fixed;
            bottom: -600px; /* Start hidden */
            right: 20px;
            width: calc(100% - 40px);
            max-width: 350px;
            height: 450px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .chat-popup.active { bottom: 20px; }

        .chat-header {
            padding: 15px; background: #111;
            display: flex; align-items: center; justify-content: space-between;
            border-top-left-radius: 15px; border-top-right-radius: 15px;
            border-bottom: 1px solid #222;
        }

        .status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; margin-right: 8px; display: inline-block; box-shadow: 0 0 5px #00ff88; }

        .chat-window { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #050505; }

        .message { padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; max-width: 80%; line-height: 1.4; }
        .bot { background: #1a1a1a; align-self: flex-start; color: #ccc; }
        .user { background: #00d4ff; color: black; align-self: flex-end; font-weight: 600; }

        .chat-input-area { padding: 12px; display: flex; gap: 8px; border-top: 1px solid #222; background: #0a0a0a; }
        #user-input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; outline: none; }
        #send-btn { background: #00d4ff; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; line-height: 1; }

        footer { margin-top: auto; padding-top: 40px; color: #444; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

    <div class="profile-section">
        <div class="profile-pic"></div>
        <h2>STREET HUMOR & RIDDLES</h2>
        <p class="sub-head">The Home of Kenyan Vibes 🇰🇪</p>
    </div>

    <div class="links-container">
        <a href="https://whatsapp.com/channel/0029Vb7QkV14dTnBkzndP63f" class="link-card highlight-whatsapp" target="_blank">
            <span>📢 FOLLOW OUR WHATSAPP CHANNEL</span>
        </a>

        <a href="https://www.instagram.com/vetruk_x" class="link-card" target="_blank">
            <span>📸 INSTAGRAM: @VETRUK_X</span>
        </a>

        <div class="link-card chat-trigger" onclick="toggleChat()">
            <span>💬 CHAT ON WEBSITE (LIVE)</span>
        </div>

        <a href="tel:+254797989297" class="link-card">
            <span>📞 CONTACT TIMON: 0797989297</span>
        </a>
    </div>

    <div id="chat-box" class="chat-popup">
        <div class="chat-header">
            <div><span class="status-dot"></span><span>Live Chat: Timon</span></div>
            <button class="close-btn" onclick="toggleChat()">×</button>
        </div>
        <div id="chat-window" class="chat-window">
            <div class="message bot">Sasa! Welcome to the hub. Ask me anything about dev or the channel.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <footer>
        <p>System Developed by Timon | 2026</p>
    </footer>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        function toggleChat() {
            const chatBox = document.getElementById('chat-box');
            chatBox.classList.toggle('active');
        }

        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;

            // Add User Message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerText = text;
            chatWindow.appendChild(userMsg);

            userInput.value = "";
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Simple Auto-Response
            setTimeout(() => {
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                botMsg.innerText = "Thanks! I've received your message. I'll get back to you soon on Instagram.";
                chatWindow.appendChild(botMsg);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
