<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Humor Hub | Live Global Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="profile-section">
        <div class="profile-pic"></div>
        <h2>STREET HUMOR GLOBAL LOBBY</h2>
        <p class="sub-head">Chat live with the crew 🇰🇪</p>
    </div>

    <div class="chat-container glass-card">
        <div class="chat-header">
            <span class="status-dot"></span>
            <span>Global Chat (Live)</span>
        </div>
        
        <div id="chat-window" class="chat-window">
            </div>

        <div class="chat-input-area">
            <input type="text" id="user-name" placeholder="Nickame..." style="width: 80px; background: #111; border: 1px solid #333; color: #00d4ff; padding: 5px; border-radius: 5px; margin-right: 5px;">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <div class="links-container" style="margin-top: 20px;">
        <a href="https://whatsapp.com/channel/0029Vb7QkV14dTnBkzndP63f" class="link-card highlight-whatsapp" target="_blank">
            <span>📢 JOIN WHATSAPP CHANNEL</span>
        </a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- REPLACE THIS WITH YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const userName = document.getElementById('user-name');
        const chatWindow = document.getElementById('chat-window');

        // SEND MESSAGE
        sendBtn.addEventListener('click', () => {
            const text = userInput.value.trim();
            const name = userName.value.trim() || "Guest";

            if (text !== "") {
                push(messagesRef, {
                    username: name,
                    message: text,
                    timestamp: serverTimestamp()
                });
                userInput.value = "";
            }
        });

        // RECEIVE MESSAGES IN REAL-TIME
        onChildAdded(messagesRef, (data) => {
            const msgData = data.val();
            const msgDiv = document.createElement('div');
            
            // Check if it's the user or someone else for styling
            msgDiv.className = `message ${msgData.username === userName.value ? 'user' : 'bot'}`;
            msgDiv.innerHTML = `<strong>${msgData.username}:</strong> ${msgData.message}`;
            
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    </script>
</body>
</html>
